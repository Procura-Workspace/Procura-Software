server {
    listen 443 ssl;
    http2 on;
    server_name procura.corp.local;

    # SSL/TLS Configurations (enforcing TLS 1.3 exclusively)
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Certificates (mapped inside container)
    ssl_certificate /etc/nginx/certs/procura.crt;
    ssl_certificate_key /etc/nginx/certs/procura.key;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Expose web application (production Nginx static server runs on port 80)
    location / {
        proxy_pass http://procura-web:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Expose Fastify API (production backend runs on port 8080)
    location /api/ {
        proxy_pass http://procura-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
