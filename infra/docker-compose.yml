services:
  postgres:
    image: postgres:17-alpine
    container_name: procura-postgres
    environment:
      POSTGRES_DB: procura
      POSTGRES_USER: procura
      POSTGRES_PASSWORD: procura_dev_password
    ports:
      - "5433:5432"
    volumes:
      - procura-postgres:/var/lib/postgresql/data
    networks:
      - procura-lan
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procura -d procura"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: procura-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - procura-redis:/data
    networks:
      - procura-lan

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: procura-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: procura_admin
      MINIO_ROOT_PASSWORD: procura_dev_password_change_me
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - procura-minio:/data
    networks:
      - procura-lan
      - procura-dmz

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: procura-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - procura-rabbitmq:/var/lib/rabbitmq
    networks:
      - procura-lan

  vault:
    image: hashicorp/vault:1.16.0
    container_name: procura-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    volumes:
      - procura-vault:/vault/file
    networks:
      - procura-admin
      - procura-lan

  mailhog:
    image: mailhog/mailhog:latest
    container_name: procura-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - procura-lan

volumes:
  procura-postgres:
  procura-redis:
  procura-minio:
  procura-rabbitmq:
  procura-vault:

networks:
  procura-lan:
    driver: bridge
  procura-dmz:
    driver: bridge
  procura-admin:
    driver: bridge
