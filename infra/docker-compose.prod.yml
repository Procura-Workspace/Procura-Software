services:
  postgres:
    image: postgres:17-alpine
    container_name: procura-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    networks:
      - procura-lan
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procura -d procura"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: procura-redis-prod
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis-prod-data:/data
    networks:
      - procura-lan

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: procura-minio-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-prod-data:/data
    networks:
      - procura-lan
      - procura-dmz

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: procura-rabbitmq-prod
    expose:
      - "5672"
      - "15672"
    volumes:
      - rabbitmq-prod-data:/var/lib/rabbitmq
    networks:
      - procura-lan

  vault:
    image: hashicorp/vault:1.16.0
    container_name: procura-vault-prod
    expose:
      - "8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    volumes:
      - vault-prod-data:/vault/file
    networks:
      - procura-admin
      - procura-lan

  mailhog:
    image: mailhog/mailhog:latest
    container_name: procura-mailhog-prod
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - procura-lan

  procura-api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    container_name: procura-api
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      AUDIT_HASH_PEPPER: ${AUDIT_HASH_PEPPER}
      REDIS_URL: redis://procura-redis-prod:6379
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - procura-lan

  procura-web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    container_name: procura-web
    expose:
      - "80"
    depends_on:
      - procura-api
    networks:
      - procura-dmz

  nginx:
    image: nginx:alpine
    container_name: procura-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./security/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./security/procura.crt:/etc/nginx/certs/procura.crt:ro
      - ./security/procura.key:/etc/nginx/certs/procura.key:ro
    networks:
      - procura-dmz
      - procura-lan
    depends_on:
      - procura-web
      - procura-api

volumes:
  postgres-prod-data:
  redis-prod-data:
  minio-prod-data:
  rabbitmq-prod-data:
  vault-prod-data:

networks:
  procura-lan:
    driver: bridge
  procura-dmz:
    driver: bridge
  procura-admin:
    driver: bridge
